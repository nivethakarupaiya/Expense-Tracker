<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#e5e7eb;
            padding:20px;
        }

        h1{
            text-align:center;
            color:#1e3a8a;
            margin-bottom:20px;
        }

        .summary{
            display:flex;
            gap:20px;
            margin-bottom:20px;
        }

        .balance,
        .income,
        .expense{
            flex:1;
            padding:20px;
            border-radius:10px;
            color:white;
            text-align:center;
        }

        .balance{
            background:#2563eb;
        }

        .income{
            background:#16a34a;
        }

        .expense{
            background:#ef4444;
        }

        .summary h3{
            margin-bottom:10px;
        }

        .summary p{
            font-size:22px;
            font-weight:bold;
        }

        .box{
            background:white;
            padding:20px;
            border-radius:10px;
            margin-bottom:20px;
        }

        .box h2{
            margin-bottom:15px;
            color:#1e3a8a;
        }

        label{
            display:block;
            margin-top:15px;
            margin-bottom:5px;
            font-weight:bold;
        }

        input,
        select{
            width:100%;
            padding:10px;
            border:1px solid gray;
            border-radius:5px;
        }

        .button-type{
            display:flex;
            gap:10px;
            margin-top:20px;
        }

        .button-type button{
            flex:1;
            padding:12px;
            border:none;
            color:white;
            font-size:16px;
            cursor:pointer;
            border-radius:5px;
        }

        .button-type button:nth-child(1){
            background:#16a34a;
        }

        .button-type button:nth-child(2){
            background:#ef4444;
        }

        .button-type button:nth-child(3){
            background:#1e3a8a;
        }

        .tx-item{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:12px;
            border-bottom:1px solid #ddd;
        }

        .tx-info{
            flex:1;
        }

        .tx-desc{
            font-weight:bold;
        }

        .tx-meta{
            font-size:14px;
            color:gray;
        }

        .tx-amount{
            font-weight:bold;
            margin-right:10px;
        }

        .delete-btn{
            background:#ef4444;
            color:white;
            border:none;
            padding:8px 12px;
            cursor:pointer;
            border-radius:5px;
        }

        .empty{
            text-align:center;
            color:gray;
            margin-top:15px;
        }

    </style>

</head>

<body>

    <h1>Expense Tracker</h1>

    <!-- SUMMARY -->

    <div class="summary">

        <div class="balance">
            <h3>Balance</h3>
            <p id="balance">₹0.00</p>
        </div>

        <div class="income">
            <h3>Total Income</h3>
            <p id="total-income">₹0.00</p>
        </div>

        <div class="expense">
            <h3>Total Expense</h3>
            <p id="total-expense">₹0.00</p>
        </div>

    </div>


    <!-- ADD TRANSACTION -->

    <div class="box">

        <h2>Add Transaction</h2>

        <label>Description</label>

        <input
            type="text"
            id="description"
            placeholder="e.g. Lunch"
        >

        <label>Amount</label>

        <input
            type="number"
            id="amount"
            placeholder="0.00"
        >

        <label>Category</label>

        <select id="category">
            <option>Food</option>
            <option>Entertainment</option>
            <option>Shopping</option>
            <option>Salary</option>
            <option>Other</option>
        </select>

        <div class="button-type">

            <button onclick="setType('income')">
                Income
            </button>

            <button onclick="setType('expense')">
                Expense
            </button>

            <button onclick="addTransactions()">
                Add Transaction
            </button>

        </div>

    </div>


    <!-- TRANSACTIONS -->

    <div class="box">

        <h2>Transactions</h2>

        <input
            type="text"
            id="search"
            placeholder="Search Transactions..."
        >

        <br><br>

        <select id="filter-category">
            <option>All</option>
            <option>Food</option>
            <option>Entertainment</option>
            <option>Shopping</option>
            <option>Salary</option>
            <option>Other</option>
        </select>

        <br><br>

        <div id="tx-list"></div>

        <p id="empty-msg" class="empty">
            No transactions yet...
        </p>

    </div>

    <script src="script.js"></script>

</body>
</html>
